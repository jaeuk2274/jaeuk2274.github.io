---
layout: base
---

<article class="page" role="article">
  <h1 class="page-title hr" style="padding-bottom:1rem">{{ page.title }}</h1>

  <div class="markdown-body">
    {{ content }}
  </div>

  <div id="search-wrapper">
    <div class="gcse-search"></div>
  </div>
</article>

<style>
/* ── Wrapper ── */
#search-wrapper { margin: 1.5rem 0 2rem; }

.gsc-control-cse {
  padding: 0 !important;
  border: none !important;
  background: transparent !important;
  font-family: inherit !important;
}

/* ── 바깥 테이블 초기화 ── */
table.gsc-search-box {
  border-collapse: separate !important;
  border-spacing: 0 !important;
  width: 100% !important;
}
table.gsc-search-box > tbody > tr > td {
  padding: 0 !important;
  border: none !important;
  vertical-align: middle !important;
}
td.gsc-input    { padding-right: 0 !important; }
td.gsc-clear-button { display: none !important; }

/* ── 인풋 박스 (테두리 컨테이너) ── */
.gsc-input-box {
  box-sizing: border-box !important;
  height: 44px !important;
  border: 2px solid #d0d5dd !important;
  border-right: none !important;
  border-radius: 8px 0 0 8px !important;
  padding: 0 !important;
  margin: 0 !important;
  background: #fff !important;
  transition: border-color .2s, box-shadow .2s !important;
}
.gsc-input-box:focus-within {
  border-color: #4285f4 !important;
  box-shadow: 0 0 0 3px rgba(66,133,244,.15) !important;
}

/* ── GCSE 내부 중첩 테이블 (안쪽 구조) ── */
.gsc-input-box table {
  height: 40px !important;
  width: 100% !important;
  border-spacing: 0 !important;
  border-collapse: collapse !important;
}
.gsc-input-box table td {
  padding: 0 !important;
  border: none !important;
  vertical-align: middle !important;
}
.gsib_a { padding: 0 10px !important; }
.gsib_b { width: 24px !important; padding: 0 4px 0 0 !important; }

/* ── 실제 인풋 ── */
input.gsc-input {
  height: 40px !important;
  font-size: 15px !important;
  font-family: inherit !important;
  color: #333 !important;
  background: transparent !important;
  border: none !important;
  outline: none !important;
  box-shadow: none !important;
  padding: 0 !important;
  margin: 0 !important;
  width: 100% !important;
}

/* ── 검색 버튼 ── */
td.gsc-search-button { vertical-align: middle !important; padding: 0 !important; }
.gsc-search-button-v2 {
  box-sizing: border-box !important;
  display: inline-flex !important;
  align-items: center !important;
  justify-content: center !important;
  height: 44px !important;
  background: #4285f4 !important;
  border: 2px solid #4285f4 !important;
  border-radius: 0 8px 8px 0 !important;
  padding: 0 20px !important;
  margin: 0 !important;
  cursor: pointer !important;
  vertical-align: middle !important;
  transition: background .2s, border-color .2s !important;
  line-height: 1 !important;
}
.gsc-search-button-v2:hover {
  background: #3367d6 !important;
  border-color: #3367d6 !important;
}
.gsc-search-button-v2 svg {
  fill: #fff !important;
  display: block !important;
  width: 18px !important;
  height: 18px !important;
}

/* ── 검색 결과 ── */
.gs-result .gs-title,
.gs-result .gs-title b   { color: #4285f4 !important; }
.gsc-result-info         { color: #888 !important; font-size: 13px !important; padding-left: 0 !important; }
.gsc-above-wrapper-area  { border-bottom: 1px solid #eee !important; padding-bottom: 8px !important; margin-bottom: 8px !important; }
</style>
